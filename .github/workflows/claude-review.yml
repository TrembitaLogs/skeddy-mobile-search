name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for the Skeddy Search Android app (Kotlin).
            Focus on:
            - Potential bugs and logic errors
            - Security issues (especially around device tokens, network calls)
            - Android best practices (lifecycle, coroutines, services)
            - Code quality and readability
            - All code comments must be in English

            Be concise. Only comment on real issues, not style preferences.
          claude_args: "--max-turns 5"
